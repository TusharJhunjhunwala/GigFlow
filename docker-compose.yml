services:
  mongo:
    image: mongo:7
    container_name: gigflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: gigflow-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/gigflow
      JWT_SECRET: replace-with-a-long-random-secret-at-least-32-characters
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: gigflow-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo_data:
